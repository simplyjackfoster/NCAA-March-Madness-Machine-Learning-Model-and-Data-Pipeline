project:
  target_year: 2026
  base_data_dir: data
  artifacts_dir: artifacts
  outputs_dir: outputs

data:
  random_seed: 42
  num_teams: 64

# Optional external data connectors.
# Set either local_path (repo-relative or absolute) or url_template for each source.
# url_template supports {year}, e.g. https://example.com/barttorvik_{year}.csv
data_sources:
  barttorvik:
    local_path:
    url_template:
  kenpom:
    local_path:
    url_template:
  kaggle:
    local_path:
    url_template:
  bracket:
    local_path:
    url_template:

simulation:
  num_sims: 5000

optimization:
  min_champion_prob: 0.02
  risk_tolerance: balanced
  pool_size: 50
